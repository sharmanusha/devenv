apiVersion: v1
kind: Pod
metadata:
  labels:
    pipeline: team-gamma
    type: multi-language
spec:
  # Service account for K8s operations
  serviceAccountName: jenkins
  
  # Security context
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  
  containers:
  # Node.js container
  - name: node
    image: node:20-alpine
    command:
      - cat
    tty: true
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "2Gi"
        cpu: "1000m"
    volumeMounts:
      - name: workspace
        mountPath: /home/jenkins/agent
  
  # Python container
  - name: python
    image: python:3.11-slim
    command:
      - cat
    tty: true
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "2Gi"
        cpu: "1000m"
    volumeMounts:
      - name: workspace
        mountPath: /home/jenkins/agent
  
  # Maven/Java container
  - name: maven
    image: maven:3.9-eclipse-temurin-17
    command:
      - cat
    tty: true
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "4Gi"
        cpu: "2000m"
    volumeMounts:
      - name: workspace
        mountPath: /home/jenkins/agent
      - name: maven-cache
        mountPath: /root/.m2
  
  # Go container
  - name: go
    image: golang:1.21-alpine
    command:
      - cat
    tty: true
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "2Gi"
        cpu: "1000m"
    volumeMounts:
      - name: workspace
        mountPath: /home/jenkins/agent
      - name: go-cache
        mountPath: /go/pkg
  
  # Docker container for image builds
  - name: docker
    image: docker:24-dind
    command:
      - dockerd
      - --host=unix:///var/run/docker.sock
      - --host=tcp://0.0.0.0:2375
      - --insecure-registry=localhost:5000
    tty: true
    securityContext:
      privileged: true
      runAsUser: 0
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "4Gi"
        cpu: "2000m"
    env:
      - name: DOCKER_TLS_CERTDIR
        value: ""
      - name: DOCKER_DRIVER
        value: overlay2
    volumeMounts:
      - name: docker-graph-storage
        mountPath: /var/lib/docker
      - name: workspace
        mountPath: /home/jenkins/agent
  
  # Kubectl container for K8s operations
  - name: kubectl
    image: bitnami/kubectl:1.28
    command:
      - cat
    tty: true
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    volumeMounts:
      - name: workspace
        mountPath: /home/jenkins/agent
  
  # Trivy container for security scanning
  - name: trivy
    image: aquasec/trivy:latest
    command:
      - cat
    tty: true
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "2Gi"
        cpu: "1000m"
    env:
      - name: TRIVY_NO_PROGRESS
        value: "true"
      - name: TRIVY_CACHE_DIR
        value: /tmp/trivy
    volumeMounts:
      - name: workspace
        mountPath: /home/jenkins/agent
      - name: trivy-cache
        mountPath: /tmp/trivy
  
  # Gitleaks container for secret scanning
  - name: gitleaks
    image: zricethezav/gitleaks:latest
    command:
      - cat
    tty: true
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "500m"
    volumeMounts:
      - name: workspace
        mountPath: /home/jenkins/agent
  
  # Semgrep container for SAST
  - name: semgrep
    image: returntocorp/semgrep:latest
    command:
      - cat
    tty: true
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "2Gi"
        cpu: "1000m"
    volumeMounts:
      - name: workspace
        mountPath: /home/jenkins/agent
  
  # Conftest container for OPA policy validation
  - name: conftest
    image: openpolicyagent/conftest:latest
    command:
      - cat
    tty: true
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "500m"
    volumeMounts:
      - name: workspace
        mountPath: /home/jenkins/agent
  
  volumes:
    - name: workspace
      emptyDir: {}
    - name: docker-graph-storage
      emptyDir: {}
    - name: maven-cache
      persistentVolumeClaim:
        claimName: jenkins-maven-cache
    - name: go-cache
      emptyDir: {}
    - name: trivy-cache
      emptyDir: {}
  
  # Node selector for build nodes
  nodeSelector:
    kubernetes.io/os: linux
  
  # Tolerations
  tolerations:
    - key: "node-role.kubernetes.io/jenkins"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
